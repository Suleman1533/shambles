<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Boostoraa</title>
  <link rel="icon" type="image/png" href="https://cdnfiles.perfectpanel.com/dwodik/qt8kpqprono9nwp6.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <div class="public-page">

    <nav class="public-navbar">
      <a href="index.html" class="public-navbar__brand">
        <img src="https://cdnfiles.perfectpanel.com/dwodik/qt8kpqprono9nwp6.png" alt="Boostoraa"
          class="public-navbar__logo">
        <span class="public-navbar__brand-name">Boostoraa</span>
      </a>
      <div class="public-navbar__links">
        <a href="index.html">Sign in</a>
        <a href="services.html">Services</a>
        <a href="api.html">API</a>
        <a href="index.html#faq">FAQ</a>
        <a href="signup.html" class="public-navbar__cta is-active">Sign up</a>
      </div>
    </nav>

    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-card__title">Create Your Account</div>
        <div class="auth-card__subtitle">Start ordering in less than a minute</div>

        <button class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4"
              d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92a8.78 8.78 0 0 0 2.68-6.62z" />
            <path fill="#34A853"
              d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z" />
            <path fill="#FBBC05"
              d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z" />
            <path fill="#EA4335"
              d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z" />
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider">or sign up with email</div>

        <div class="field">
          <label class="field__label">Username</label>
          <input type="text" class="input" placeholder="Choose a username">
        </div>
        <div class="field">
          <label class="field__label">Email</label>
          <input type="email" class="input" placeholder="you@example.com">
        </div>
        <div class="field">
          <label class="field__label">Password</label>
          <input type="password" class="input" placeholder="Create a password">
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="agree">
          <label for="agree">I agree to the <a href="terms.html" style="color:var(--color-blue);">Terms of
              Service</a></label>
        </div>

        <button class="btn btn-primary">Create Account</button>

        <div class="auth-card__footer">
          Already have an account? <a href="index.html">Sign in</a>
        </div>
      </div>
    </div>

    <footer class="public-footer">
      <div class="public-footer__inner">
        <span>© 2026 Boostoraa. All Rights Reserved.</span>
        <a href="terms.html">Terms</a>
      </div>
    </footer>

  </div>

  <!-- Mobile bottom navigation -->
  <nav class="public-bottom-nav">
    <div class="public-bottom-nav__inner">
      <a href="index.html" class="public-bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z" />
        </svg>
        Sign in
      </a>
      <a href="services.html" class="public-bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        Services
      </a>
      <a href="index.html#faq" class="public-bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9" />
          <path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.7.35-1 .85-1 1.7" />
          <line x1="12" y1="17" x2="12" y2="17.01" />
        </svg>
        FAQ
      </a>
      <a href="api.html" class="public-bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
        API
      </a>
      <a href="signup.html" class="public-bottom-nav__item is-active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="7" r="4" />
          <path d="M2 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2" />
          <line x1="19" y1="8" x2="19" y2="14" />
          <line x1="16" y1="11" x2="22" y2="11" />
        </svg>
        Sign up
      </a>
    </div>
  </nav>

</body>

</html>
